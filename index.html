<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc+</title>
    <style>
        /* CSS Variables for consistent theming */
        :root {
            --bg-base: #0b0f17;
            --bg-card: #151a28;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(15, 20, 30, 0.75);
            --accent: #3b82f6;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg-base); 
            color: var(--text-main); 
            overflow-x: hidden; 
        }

        /* --- View Transitions --- */
        .view-container {
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
        }
        .view-container.hidden {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- Navbar (Glassmorphism) --- */
        .navbar { 
            position: sticky; 
            top: 0; 
            z-index: 100;
            display: flex; 
            padding: 16px 40px; 
            gap: 16px; 
            align-items: center; 
            justify-content: center; 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color); 
        }
        
        .library-dropdown, .search-bar { 
            padding: 12px 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            background: rgba(0, 0, 0, 0.2); 
            color: white; 
            font-size: 15px; 
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .library-dropdown { cursor: pointer; }
        .library-dropdown option { background: var(--bg-card); color: white; }
        
        .search-bar { flex-grow: 1; max-width: 500px; }
        .search-bar::placeholder { color: var(--text-muted); }
        .search-bar:focus, .library-dropdown:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); 
        }

        /* --- Game Grid --- */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 24px; 
            padding: 40px; 
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .game-card { 
            background: var(--bg-card); 
            border-radius: 16px; 
            border: 1px solid var(--border-color);
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .game-card:hover { 
            transform: translateY(-8px) scale(1.02); 
            box-shadow: 0 12px 30px rgba(0,0,0,0.5), 0 0 20px rgba(59, 130, 246, 0.15); 
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .game-card img { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            display: block; 
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 18px;
        }

        /* --- Game Iframe Page --- */
        #game-page {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--bg-base);
            z-index: 1000;
        }
        
        .sidebar { 
            position: absolute; 
            left: 0; top: 0; bottom: 0; 
            width: 70px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 24px; 
            gap: 16px; 
            border-right: 1px solid var(--border-color);
            z-index: 10;
        }
        
        .sidebar button { 
            background: rgba(255,255,255,0.05); 
            color: white; 
            border: 1px solid var(--border-color); 
            width: 46px; height: 46px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 20px;
            transition: all 0.2s ease;
            display: flex; justify-content: center; align-items: center;
        }
        .sidebar button:hover { 
            background: rgba(255,255,255,0.1); 
            transform: scale(1.05);
        }
        
        #game-iframe { 
            position: absolute;
            left: 70px; 
            width: calc(100vw - 70px); 
            height: 100vh; 
            border: none; 
            background: #000;
        }
    </style>
</head>
<body>

    <div id="home-page" class="view-container">
        <div class="navbar">
            <select id="library-select" class="library-dropdown"></select>
            <input type="text" id="search-input" class="search-bar" placeholder="🔍 Search games...">
        </div>
        <div id="game-grid" class="game-grid">
            </div>
    </div>

    <div id="game-page" class="view-container hidden">
        <div class="sidebar">
            <button id="back-btn" title="Back to Home">←</button>
            <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>
        </div>
        <iframe id="game-iframe" src=""></iframe>
    </div>

    <script src="list.js"></script>
    <script src="main.js"></script>
</body>
</html>
