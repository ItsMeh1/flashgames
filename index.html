<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc+</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --sidebar: #151518;
            --card: #1c1c21;
            --border: #2d2d35;
            --accent: #3b82f6;
            --text: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- Sidebar --- */
        aside { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem; }
        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.05rem; margin-bottom: 2rem; color: var(--accent); }
        
        .nav-label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05rem; margin-bottom: 1rem; }
        .lib-btn { 
            background: transparent; border: none; color: var(--text-dim); padding: 0.8rem 1rem; text-align: left; 
            font-size: 0.9rem; font-weight: 600; border-radius: 10px; cursor: pointer; transition: 0.2s; margin-bottom: 0.5rem;
        }
        .lib-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .lib-btn.active { background: var(--accent); color: white; }

        /* --- Main Content --- */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: flex-end; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,13,15,0.8); backdrop-filter: blur(10px); z-index: 10; }
        
        .search-box { background: var(--card); border: 1px solid var(--border); padding: 0.7rem 1.2rem; border-radius: 12px; color: white; outline: none; width: 300px; transition: 0.2s; }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; padding: 2rem; }

        /* --- Cards --- */
        .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-5px); border-color: var(--text-dim); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; }
        .card-body { padding: 1.2rem; }
        .card-name { font-weight: 700; font-size: 1rem; margin-bottom: 0.4rem; }
        .card-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- Overlay (The Iframe) --- */
        #overlay { position: fixed; inset: 0; background: black; z-index: 1000; display: none; }
        .game-nav { position: absolute; left: 0; top: 0; bottom: 0; width: 60px; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding-top: 1.5rem; gap: 1rem; }
        .nav-icon { width: 35px; height: 35px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-icon:hover { background: #333; }
        
        iframe { position: absolute; left: 60px; width: calc(100% - 60px); height: 100%; border: none; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">Arc+</div>
        <div class="nav-label">Your Libraries</div>
        <div id="lib-list"></div>
    </aside>

    <main>
        <header>
            <input type="text" id="search" class="search-box" placeholder="Search games...">
        </header>
        <div id="grid" class="grid"></div>
    </main>

    <div id="overlay">
        <div class="game-nav">
            <button class="nav-icon" onclick="closeGame()">✕</button>
            <button class="nav-icon" onclick="toggleFS()">⛶</button>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script src="list.js"></script>
    <script src="main.js"></script>
</body>
</html>
