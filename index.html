<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --border: #27272a;
            --accent: #3b82f6;
            --text: #fafafa;
            --text-muted: #a1a1aa;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background-color: var(--bg); color: var(--text);
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 2rem; background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 50;
        }

        .search-container { display: flex; gap: 0.75rem; flex: 1; max-width: 600px; }

        .input-style {
            background: var(--surface); border: 1px solid var(--border);
            color: white; padding: 0.6rem 1rem; border-radius: 8px;
            font-size: 0.9rem; outline: none; transition: all 0.2s;
        }
        .input-style:focus { border-color: var(--accent); ring: 2px var(--accent); }
        .search-bar { flex: 1; }

        /* --- Grid --- */
        .main-content { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .card {
            position: relative; background: var(--surface); border-radius: 12px;
            border: 1px solid var(--border); overflow: hidden;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-4px); border-color: #52525b; }
        
        .card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; }

        .card-info { padding: 1rem; }
        .card-title { font-weight: 600; font-size: 1rem; margin: 0; }
        .card-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }

        /* --- Overlay View --- */
        #game-overlay {
            position: fixed; inset: 0; background: var(--bg);
            display: none; z-index: 100;
        }

        .game-nav {
            position: absolute; left: 0; top: 0; bottom: 0; width: 64px;
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 1rem; gap: 1rem;
        }

        .nav-btn {
            width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: white; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { background: var(--border); }

        iframe {
            position: absolute; left: 64px; top: 0; width: calc(100% - 64px);
            height: 100%; border: none; background: #000;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px;">ARCADE</div>
        <div class="search-container">
            <select id="lib-select" class="input-style"></select>
            <input type="text" id="search-bar" class="input-style search-bar" placeholder="Search library...">
        </div>
    </header>

    <main class="main-content">
        <div id="game-grid" class="grid"></div>
    </main>

    <div id="game-overlay">
        <nav class="game-nav">
            <button class="nav-btn" onclick="closeGame()" title="Back">✕</button>
            <button class="nav-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
        </nav>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script src="list.js"></script>
    <script src="main.js"></script>
</body>
</html>
