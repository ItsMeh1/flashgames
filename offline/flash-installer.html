        let currentSearchQuery = "";

        function handleSearch(value) {
            currentSearchQuery = value.toLowerCase().trim();
            renderHub();
        }

        function renderHub() {
            const container = document.getElementById('games-grid');
            container.innerHTML = '';

            // Filter down the global links array based on the active query string
            const filteredGames = GAME_LINKS.filter(game => {
                return game.label.toLowerCase().includes(currentSearchQuery);
            });

            if (filteredGames.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 text-center text-slate-500 border border-dashed border-slate-800 rounded-xl bg-slate-900/20">
                        💨 No matching library elements found for "${currentSearchQuery}"
                    </div>
                `;
                return;
            }

            filteredGames.forEach(game => {
                let domain = "google.com";
                try {
                    domain = new URL(game.url).hostname;
                } catch(e) {}
                
                const iconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
                const installCommand = `flash install ${game.url}`;

                const card = document.createElement('div');
                card.className = "bg-slate-900/60 border border-slate-800 rounded-xl p-5 hover:border-blue-500/50 transition-all duration-200 flex flex-col justify-between group backdrop-blur-sm shadow-xl animate-fade-in";
                
                card.innerHTML = `
                    <div class="flex items-start gap-4 mb-4">
                        <img src="${iconUrl}" alt="${game.label}" class="w-12 h-12 rounded-lg bg-slate-800 p-1 object-contain border border-slate-700/50 group-hover:scale-105 transition-transform" onerror="this.src='https://www.google.com/s2/favicons?domain=google.com&sz=128'">
                        <div class="flex-1 min-w-0">
                            <h3 class="text-lg font-semibold text-slate-100 truncate group-hover:text-blue-400 transition-colors">${game.label}</h3>
                            <p class="text-xs text-slate-500 truncate mt-0.5 font-mono">${domain}</p>
                        </div>
                    </div>
                    <div>
                        <div class="bg-slate-950/80 rounded-lg p-2.5 font-mono text-xs text-slate-400 border border-slate-900 overflow-x-auto whitespace-nowrap mb-3 scrollbar-none select-all">
                            ${installCommand}
                        </div>
                        <button onclick="copyCommand(this, '${btoa(installCommand)}')" class="w-full bg-slate-800 hover:bg-blue-600 text-slate-200 hover:text-white font-medium text-sm py-2 px-4 rounded-lg cursor-pointer transition-all duration-150 flex items-center justify-center gap-2 shadow-inner">
                            📋 Copy Code Block
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function copyCommand(button, encodedCommand) {
            const command = atob(encodedCommand);
            navigator.clipboard.writeText(command).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = "✨ Copied To Clipboard!";
                button.classList.remove('bg-slate-800', 'hover:bg-blue-600', 'text-slate-200');
                button.classList.add('bg-green-600/90', 'text-white');

                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.classList.remove('bg-green-600/90');
                    button.classList.add('bg-slate-800', 'hover:bg-blue-600', 'text-slate-200');
                }, 1800);
            }).catch(err => {
                console.error('Could not copy command to layout target clipboard.', err);
            });
        }
