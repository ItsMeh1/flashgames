<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Luck RNG - Dynamic Upgrades</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Outfit:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #0f0f13;
            --card-bg: #1a1a24;
            --accent: #7b2cbf;
            --text-main: #f8f9fa;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 650px) {
            .game-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2d2d3d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #ff007f, #7b2cbf, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .stat-val {
            font-weight: 600;
            color: #00f0ff;
        }

        /* Roll Display Panel */
        .roll-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 40px 0;
            text-align: center;
        }

        .current-item {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            min-height: 54px;
            transition: transform(0.1s) ease;
        }

        .current-rarity {
            font-family: 'Courier Prime', monospace;
            font-size: 16px;
            color: var(--text-muted);
            min-height: 24px;
            margin-bottom: 25px;
        }

        .btn {
            background: linear-gradient(135deg, #9d4edd, #7b2cbf);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(123, 44, 191, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 44, 191, 0.6);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-secondary {
            background: #252538;
            border: 1px solid #3d3d5c;
            color: var(--text-main);
            font-size: 14px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-secondary:hover {
            background: #2f2f47;
        }

        .btn-secondary.active {
            background: #00b4d8;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
            border-color: #00b4d8;
            color: #0f0f13;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        /* Upgrades & Collection Layout */
        h2 {
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid #2d2d3d;
            padding-bottom: 8px;
            color: var(--text-muted);
        }

        .upgrade-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #2d2d3d;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-info p {
            font-size: 15px;
            font-weight: 600;
        }

        .upgrade-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .btn-buy {
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
            background: #2d6a4f;
            box-shadow: 0 4px 10px rgba(45, 106, 79, 0.3);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-buy:hover {
            background: #40916c;
            box-shadow: 0 4px 12px rgba(64, 145, 108, 0.5);
        }
        .btn-buy:disabled {
            background: #22222e;
            color: #555566;
            box-shadow: none;
            cursor: not-allowed;
            border: 1px solid #2d2d3d;
        }

        .inventory-list {
            max-height: 275px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }

        .inventory-list::-webkit-scrollbar { width: 6px; }
        .inventory-list::-webkit-scrollbar-thumb { background: #2d2d3d; border-radius: 4px; }

        .inv-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;
            font-size: 14px;
        }
        .inv-count {
            font-family: 'Courier Prime', monospace;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="panel full-width">
            <h1>INFINITY LUCK RNG</h1>
            <div class="stats-bar">
                <div>Total Rolls: <span class="stat-val" id="stat-rolls">0</span></div>
                <div>Luck Multiplier: <span class="stat-val" id="stat-luck">1.0x</span></div>
                <div>Luck Points: <span class="stat-val" id="stat-points" style="color: #40916c;">0</span></div>
            </div>
        </div>

        <div class="panel">
            <h2>The Gateway</h2>
            <div class="roll-area">
                <div class="current-item" id="display-name" style="color: #94a3b8;">Click Roll</div>
                <div class="current-rarity" id="display-rarity">1 in 0</div>
            </div>
            <button class="btn" id="btn-roll" onclick="roll()">ROLL</button>
            
            <div class="control-group">
                <button class="btn-secondary" id="btn-auto" onclick="toggleAuto()">Auto-Roll: OFF</button>
                <button class="btn-secondary btn-danger" onclick="wipeSave()">Wipe Save Data</button>
            </div>
        </div>

        <div class="panel">
            <h2>Upgrades</h2>
            <div id="upgrades-box"></div>

            <h2 style="margin-top: 15px;">Collection Storage</h2>
            <div class="inventory-list" id="inventory-box"></div>
        </div>
    </div>

    <script>
        // Core Game Engine State Framework Variables
        let rolls = 0;
        let luckMultiplier = 1.0;
        let luckPoints = 0;
        let autoRolling = false;
        let autoInterval = null;

        // ==========================================
        // DYNAMIC UPGRADE POOL
        // Easily add new upgrades here!
        // costScaling determines how fast the price goes up (1.10 is slow, 1.50 is fast)
        // ==========================================
        const upgradePool = [
            { id: "clover", name: "Lucky Clover", desc: "+0.2x Multiplier", baseCost: 10, costScaling: 1.15, multGain: 0.2 },
            { id: "alignment", name: "Cosmic Alignment", desc: "+1.5x Multiplier", baseCost: 150, costScaling: 1.18, multGain: 1.5 },
            { id: "matrix", name: "Probability Matrix", desc: "+8.0x Multiplier", baseCost: 1200, costScaling: 1.20, multGain: 8.0 },
            { id: "singularity", name: "Luck Singularity", desc: "+50.0x Multiplier", baseCost: 15000, costScaling: 1.25, multGain: 50.0 }
        ];

        // Structural storage maps for upgrades
        let upgradeLevels = {};
        upgradePool.forEach(up => upgradeLevels[up.id] = 0);

        // Expanded Item Database
const itemPool = [
    { name: "Dirt", rarity: 2, color: "#94a3b8", points: 1 },
    { name: "Pebble", rarity: 3, color: "#78716c", points: 2 },
    { name: "Grass", rarity: 4, color: "#04483bff", points: 3 },
    { name: "Copper Ring", rarity: 5, color: "#cd7f32", points: 5 },
    { name: "Wooden Stick", rarity: 8, color: "#854d0e", points: 7 },
    { name: "Iron Greatsword", rarity: 15, color: "#a5a5a5", points: 10 },
    { name: "Steel Dagger", rarity: 22, color: "#cbd5e1", points: 12 },
    { name: "Emerald", rarity: 30, color: "#2ef4b8ff", points: 15 },
    { name: "Silver Chalice", rarity: 50, color: "#00b4d8", points: 25 },
    { name: "Golden Crown", rarity: 100, color: "#fbbf24", points: 45 },
    { name: "Light Amethyst", rarity: 200, color: "#9d4edd", points: 80 },
    { name: "Dark Amethyst", rarity: 200, color: "#8c00ffff", points: 80 },
    { name: "Sapphire Crystal", rarity: 500, color: "#2563eb", points: 180 },
    { name: "Flawless Ruby", rarity: 1000, color: "#ff0055", points: 350 },
    { name: "Cobalt Relic", rarity: 2000, color: "#0284c7", points: 550 },
    { name: "Meteorite Shard", rarity: 3000, color: "#ec4899", points: 800 },
    { name: "Cyber Matrix", rarity: 7500, color: "#00f0ff", points: 1500 },
    { name: "Quantum Catalyst", rarity: 12500, color: "#14b8a6", points: 3500 },
    { name: "Data Core", rarity: 20000, color: "#729dfbff", points: 6000 },
    { name: "Plasma Core", rarity: 40000, color: "#ffb703", points: 8000 },
    { name: "Antimatter Droplet", rarity: 100000, color: "#a855f7", points: 22000 },
    { name: "Singularity", rarity: 250000, color: "#ff007f", points: 50000 },
    { name: "Infinity Void", rarity: 500000, color: "#ffaa00", points: 250000 },
    { name: "Nothingness", rarity: 750000, color: "#64748b", points: 500000 },
    { name: "Flash", rarity: 750000, color: "#fff709ff", points: 750000 },
    { name: "Owner", rarity: 750000, color: "#369ce0ff", points: 1000000 },
    { name: "Chronos Warp", rarity: 1500000, color: "#10b981", points: 2000000 },
    { name: "Nebula Blossom", rarity: 3500000, color: "#f472b6", points: 4500000 },
    { name: "Multiverse Core", rarity: 5000000, color: "#f43f5e", points: 6500000 },
    { name: "The Terrmari", rarity: 8500000, color: "#000000", points: 11000000 },
    { name: "Beyond Absolute", rarity: 10000000, color: "#ffffff", points: 15000000 }
];


        let inventory = {};
        itemPool.forEach(item => inventory[item.name] = 0);

        // PERSISTENCE: Save Game (Updated to v3 for the new array structure)
        function saveGame() {
            const saveState = {
                rolls: rolls,
                luckPoints: luckPoints,
                upgradeLevels: upgradeLevels,
                inventory: inventory
            };
            localStorage.setItem('infinity_rng_save_v3', JSON.stringify(saveState));
        }

        // PERSISTENCE: Load Game
        // PERSISTENCE: Load Game & Migrate Old Saves
        function loadGame() {
            // 1. Try to load the new v3 data first
            const v3Data = localStorage.getItem('infinity_rng_save_v3');
            if (v3Data) {
                try {
                    const parsed = JSON.parse(v3Data);
                    rolls = parsed.rolls || 0;
                    luckPoints = parsed.luckPoints || 0;
                    
                    if (parsed.upgradeLevels) {
                        for (const key in parsed.upgradeLevels) {
                            if (upgradeLevels.hasOwnProperty(key)) upgradeLevels[key] = parsed.upgradeLevels[key];
                        }
                    }
                    if (parsed.inventory) {
                        for (const key in parsed.inventory) {
                            if (inventory.hasOwnProperty(key)) inventory[key] = parsed.inventory[key];
                        }
                    }
                    recalculateMultiplier();
                    return; // Exit if v3 loaded successfully
                } catch (e) { console.error("Save parse error:", e); }
            }

            // 2. If no v3 data exists, hunt for the old save data!
            // (Checking common keys from previous versions)
            const oldData = localStorage.getItem('infinity_rng_save_v2') || localStorage.getItem('infinity_rng_save_v1') || localStorage.getItem('infinity_rng_save');
            
            if (oldData) {
                try {
                    const parsed = JSON.parse(oldData);
                    rolls = parsed.rolls || 0;
                    luckPoints = parsed.luckPoints || 0;
                    
                    // Translate old upgrades to the new naming system
                    if (parsed.up1_level) upgradeLevels['clover'] = parsed.up1_level;
                    if (parsed.up2_level) upgradeLevels['alignment'] = parsed.up2_level;
                    
                    // Port old inventory over
                    if (parsed.inventory) {
                        for (const key in parsed.inventory) {
                            if (inventory.hasOwnProperty(key)) inventory[key] = parsed.inventory[key];
                        }
                    }
                    
                    console.log("Old save recovered and migrated to v3!");
                    recalculateMultiplier();
                    saveGame(); // Instantly save it into the new format so you don't lose it again
                } catch (e) { console.error("Migration parse error:", e); }
            } else {
                recalculateMultiplier();
            }
        }

        function wipeSave() {
            if (confirm("Erase all data? This cannot be undone.")) {
                if (autoRolling) toggleAuto();
                localStorage.removeItem('infinity_rng_save_v3');
                
                rolls = 0;
                luckPoints = 0;
                upgradePool.forEach(up => upgradeLevels[up.id] = 0);
                itemPool.forEach(item => inventory[item.name] = 0);
                recalculateMultiplier();
                
                document.getElementById('display-name').innerText = "Click Roll";
                document.getElementById('display-name').style.color = "#94a3b8";
                document.getElementById('display-rarity').innerText = "1 in 0";
                
                updateUI();
            }
        }

        // Core Weighted RNG
        function roll() {
            rolls++;
            let virtualChance = Math.random() / luckMultiplier;
            let rolledItem = itemPool[0]; 

            for(let i = itemPool.length - 1; i >= 0; i--) {
                if (virtualChance <= (1 / itemPool[i].rarity)) {
                    rolledItem = itemPool[i];
                    break;
                }
            }

            inventory[rolledItem.name]++;
            luckPoints += rolledItem.points;

            const displayNode = document.getElementById('display-name');
            displayNode.style.transform = "scale(0.94)";
            setTimeout(() => displayNode.style.transform = "scale(1)", 40);

            displayNode.innerText = rolledItem.name;
            displayNode.style.color = rolledItem.color;
            document.getElementById('display-rarity').innerText = `Rarity: 1 in ${rolledItem.rarity.toLocaleString()}`;

            updateUI();
            saveGame(); 
        }

        function toggleAuto() {
            autoRolling = !autoRolling;
            const autoBtn = document.getElementById('btn-auto');
            
            if(autoRolling) {
                autoBtn.innerText = "Auto-Roll: ON";
                autoBtn.classList.add('active');
                autoInterval = setInterval(roll, 120); 
            } else {
                autoBtn.innerText = "Auto-Roll: OFF";
                autoBtn.classList.remove('active');
                clearInterval(autoInterval);
            }
        }

        function getUpgradeCost(id) {
            let up = upgradePool.find(u => u.id === id);
            let lvl = upgradeLevels[id];
            return Math.round(up.baseCost * Math.pow(up.costScaling, lvl));
        }

        function recalculateMultiplier() {
            luckMultiplier = 1.0;
            upgradePool.forEach(up => {
                luckMultiplier += upgradeLevels[up.id] * up.multGain;
            });
        }

        function buyUpgrade(id) {
            let cost = getUpgradeCost(id);
            if(luckPoints >= cost) {
                luckPoints -= cost;
                upgradeLevels[id]++;
                
                recalculateMultiplier();
                updateUI();
                saveGame();
            }
        }

        function updateUI() {
            document.getElementById('stat-rolls').innerText = rolls.toLocaleString();
            document.getElementById('stat-luck').innerText = luckMultiplier.toFixed(1) + "x";
            document.getElementById('stat-points').innerText = luckPoints.toLocaleString();

            // Render Dynamic Upgrades
            const upBox = document.getElementById('upgrades-box');
            upBox.innerHTML = ''; // Clear existing
            
            upgradePool.forEach(up => {
                let cost = getUpgradeCost(up.id);
                let lvl = upgradeLevels[up.id];
                
                let div = document.createElement('div');
                div.className = 'upgrade-card';
                div.innerHTML = `
                    <div class="upgrade-info">
                        <p>${up.name}</p>
                        <span>${up.desc} (Lv. ${lvl})</span>
                    </div>
                    <button class="btn-buy" onclick="buyUpgrade('${up.id}')" ${luckPoints < cost ? 'disabled' : ''}>
                        Cost: ${cost.toLocaleString()} LP
                    </button>
                `;
                upBox.appendChild(div);
            });

            // Render Inventory
            const invBox = document.getElementById('inventory-box');
            invBox.innerHTML = '';
            
            for(let i = itemPool.length - 1; i >= 0; i--) {
                let name = itemPool[i].name;
                if(inventory[name] > 0) {
                    let div = document.createElement('div');
                    div.className = 'inv-item';
                    div.style.borderLeft = `3px solid ${itemPool[i].color}`;
                    div.innerHTML = `
                        <span style="color: ${itemPool[i].color}; font-weight: 600;">${name} <small style="color:var(--text-muted); font-weight:400; font-size:11px;">(1 in ${itemPool[i].rarity.toLocaleString()})</small></span>
                        <span class="inv-count">x${inventory[name].toLocaleString()}</span>
                    `;
                    invBox.appendChild(div);
                }
            }
        }

        // Boot Init
        loadGame();
        updateUI();
    </script>
</body>
</html>
