<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Pixel Perfect Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&display=swap');

        :root {
            --bg-color: #faf8ef;
            --text-color: #776e65;
            --board-bg: #bbada0;
            --cell-empty: rgba(238, 228, 218, 0.35);
            --btn-bg: #8f7a66;
            --btn-hover: #9f8b77;
            --radius: 6px;
            --grid-gap: 12px;
            --transition-speed: 100ms;
            --grid-size: 4; 
        }

        * {
            box-sizing: border-box;
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 50px;
            font-weight: bold;
            margin: 0;
            letter-spacing: -1px;
            line-height: 1;
        }

        .score-container {
            background: var(--board-bg);
            padding: 5px 20px;
            border-radius: 3px;
            color: white;
            text-align: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 13px;
            text-transform: uppercase;
            font-weight: bold;
            color: #eee4da;
            margin-bottom: -2px;
        }

        .score-value {
            font-size: 25px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        button {
            background-color: var(--btn-bg);
            color: #f9f6f2;
            border: none;
            padding: 10px 16px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.1s ease;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .powerup-btn {
            background-color: #e6a964;
        }
        
        .powerup-btn:hover {
            background-color: #f6b974;
        }

        .game-container {
            position: relative;
            background: var(--board-bg);
            padding: var(--grid-gap);
            border-radius: 6px;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
        }

        /* Static Background Grid Layer */
        .grid-background {
            display: grid;
            width: 100%;
            height: 100%;
            gap: var(--grid-gap);
        }

        .grid-cell {
            background-color: var(--cell-empty);
            border-radius: var(--radius);
        }

        /* Absolute Sliding Tile Layer Container */
        .tile-container {
            position: absolute;
            top: var(--grid-gap);
            left: var(--grid-gap);
            right: var(--grid-gap);
            bottom: var(--grid-gap);
            z-index: 2;
        }

        /* FIXED: Absolute alignment system using self-referencing percentages */
        .tile {
            position: absolute;
            z-index: 10;
            
            /* Dynamically sizes boxes cleanly to match the background cells exactly */
            width: calc((100% - (var(--grid-size) - 1) * var(--grid-gap)) / var(--grid-size));
            height: calc((100% - (var(--grid-size) - 1) * var(--grid-gap)) / var(--grid-size));
            
            /* Translate percentages look at the TILE size, avoiding parent fractional rounding bugs */
            transform: translate(
                calc(var(--col) * (100% + var(--grid-gap))), 
                calc(var(--row) * (100% + var(--grid-gap)))
            );
            
            transition: transform var(--transition-speed) ease-in-out;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            border-radius: var(--radius);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* Exact Authentic 2048 Color Matrix */
        .tile-2 .tile-inner { background: #eee4da; color: #776e65; }
        .tile-4 .tile-inner { background: #ede0c8; color: #776e65; }
        .tile-8 .tile-inner { background: #f2b179; color: #f9f6f2; }
        .tile-16 .tile-inner { background: #f59563; color: #f9f6f2; }
        .tile-32 .tile-inner { background: #f67c5f; color: #f9f6f2; }
        .tile-64 .tile-inner { background: #f65e3b; color: #f9f6f2; }
        .tile-128 .tile-inner { background: #edcf72; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.23); }
        .tile-256 .tile-inner { background: #edcc61; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.31); }
        .tile-512 .tile-inner { background: #edc850; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.4); }
        .tile-1024 .tile-inner { background: #edc53f; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.48); }
        .tile-2048 .tile-inner { background: #edc22e; color: #f9f6f2; box-shadow: 0 0 30px 10px rgba(243, 215, 116, 0.56); }
        .tile-super .tile-inner { background: #3c3a32; color: #f9f6f2; }

        /* Animation Keyframes */
        .tile-new .tile-inner {
            animation: appear 200ms ease 100ms;
            animation-fill-mode: backwards;
        }

        .tile-merged { z-index: 20; }
        .tile-merged .tile-inner {
            animation: pop 200ms ease;
        }

        .tile-to-remove { z-index: 5; } 

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in-out;
        }

        .game-over.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-over h2 {
            font-size: 60px;
            font-weight: bold;
            margin: 0 0 20px 0;
            color: #776e65;
        }

        .instructions {
            margin-top: 20px;
            color: #776e65;
            font-size: 16px;
            line-height: 1.5;
            text-align: center;
            max-width: 500px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button onclick="changeSize(3)">3x3</button>
            <button onclick="changeSize(4)">4x4</button>
            <button onclick="changeSize(5)">5x5</button>
        </div>
        <div class="btn-group">
            <button class="powerup-btn" id="btn-undo" onclick="undo()" title="Undo last move">↩ Undo</button>
            <button class="powerup-btn" id="btn-nuke" onclick="nuke()" title="Clear all 2s">💣 Nuke (3)</button>
        </div>
    </div>

    <div class="game-container">
        <div class="grid-background" id="grid-background"></div>
        <div class="tile-container" id="tile-container"></div>
        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <button onclick="resetGame()" style="padding: 12px 24px; font-size: 18px;">Try Again</button>
        </div>
    </div>

    <div class="instructions">
        <strong>How to play:</strong> Use your <strong>arrow keys</strong> to glide tiles. When two tiles with the same matching face collide, they <strong>merge into one!</strong>
    </div>

    <script>
        let size = 4;
        let score = 0;
        let boardState = []; 
        let history = [];
        let nukeCount = 3;
        let tileIdCounter = 0; 

        const gridBg = document.getElementById('grid-background');
        const tileContainer = document.getElementById('tile-container');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('game-over');
        const btnUndo = document.getElementById('btn-undo');
        const btnNuke = document.getElementById('btn-nuke');

        function init() {
            // Bind structural variable properties over to CSS core
            document.documentElement.style.setProperty('--grid-size', size);
            gridBg.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridBg.style.gridTemplateRows = `repeat(${size}, 1fr)`;
            
            gridBg.innerHTML = '';
            for (let i = 0; i < size * size; i++) {
                let cell = document.createElement('div');
                cell.classList.add('grid-cell');
                gridBg.appendChild(cell);
            }
            resetGame();
        }

        function resetGame() {
            tileContainer.innerHTML = '';
            boardState = [];
            score = 0;
            history = [];
            nukeCount = 3;
            gameOverElement.classList.remove('active');
            updatePowerups();
            addRandomTile();
            addRandomTile();
            renderTiles();
        }

        function changeSize(newSize) {
            size = newSize;
            init();
        }

        function saveState() {
            history.push({
                boardState: boardState.filter(t => !t.toRemove).map(t => ({ id: t.id, r: t.r, c: t.c, value: t.value })),
                score: score
            });
            updatePowerups();
        }

        function undo() {
            if (history.length > 0) {
                const previousState = history.pop();
                score = previousState.score;
                tileContainer.innerHTML = '';
                boardState = previousState.boardState.map(t => ({ ...t }));
                renderTiles();
                updatePowerups();
                gameOverElement.classList.remove('active');
            }
        }

        function nuke() {
            if (nukeCount > 0) {
                saveState();
                let targets = boardState.filter(t => t.value === 2 && !t.toRemove);
                if (targets.length > 0) {
                    boardState = boardState.filter(t => t.value !== 2 || t.toRemove);
                    nukeCount--;
                    renderTiles();
                } else {
                    history.pop(); 
                }
                updatePowerups();
            }
        }

        function updatePowerups() {
            btnUndo.disabled = history.length === 0;
            btnNuke.innerText = `💣 Nuke (${nukeCount})`;
            btnNuke.disabled = nukeCount === 0;
        }

        function addRandomTile() {
            let occupied = Array.from({ length: size }, () => Array(size).fill(false));
            boardState.forEach(tile => { 
                if (!tile.toRemove) occupied[tile.r][tile.c] = true; 
            });

            let emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (!occupied[r][c]) emptyCells.push({ r, c });
                }
            }

            if (emptyCells.length > 0) {
                let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                boardState.push({
                    id: tileIdCounter++,
                    r: cell.r,
                    c: cell.c,
                    value: Math.random() < 0.9 ? 2 : 4,
                    isNew: true,
                    isMerged: false,
                    toRemove: false
                });
            }
        }

        function renderTiles() {
            scoreElement.innerText = score;
            
            boardState.forEach(tile => {
                let el = document.querySelector(`[data-id="${tile.id}"]`);
                
                if (!el) {
                    el = document.createElement('div');
                    el.dataset.id = tile.id;
                    el.classList.add('tile');
                    
                    let inner = document.createElement('div');
                    inner.classList.add('tile-inner');
                    el.appendChild(inner);
                    tileContainer.appendChild(el);
                }

                // Map row and column definitions directly into CSS environment
                el.style.setProperty('--row', tile.r);
                el.style.setProperty('--col', tile.c);

                el.className = `tile tile-${tile.value > 2048 ? 'super' : tile.value}`;
                let inner = el.querySelector('.tile-inner');
                inner.innerText = tile.value;

                // Scaled responsive typography rules
                if (size === 3) inner.style.fontSize = tile.value >= 1024 ? '38px' : '58px';
                if (size === 4) inner.style.fontSize = tile.value >= 1024 ? '30px' : '48px';
                if (size === 5) inner.style.fontSize = tile.value >= 1024 ? '22px' : '36px';

                if (tile.isNew) {
                    el.classList.add('tile-new');
                    tile.isNew = false; 
                }
                if (tile.isMerged) {
                    el.classList.add('tile-merged');
                    tile.isMerged = false; 
                }
                if (tile.toRemove) {
                    el.classList.add('tile-to-remove');
                }
            });

            // Prune old merging nodes cleanly at end of slide duration
            setTimeout(() => {
                boardState = boardState.filter(t => !t.toRemove);
                document.querySelectorAll('.tile-to-remove').forEach(el => el.remove());
            }, 100);
        }

        function move(direction) {
            if (gameOverElement.classList.contains('active')) return;
            
            boardState = boardState.filter(t => !t.toRemove);

            const vectors = {
                'up': { r: -1, c: 0 },
                'down': { r: 1, c: 0 },
                'left': { r: 0, c: -1 },
                'right': { r: 0, c: 1 }
            };
            
            let vec = vectors[direction];
            saveState();

            let orderR = Array.from({length: size}, (_, i) => i);
            let orderC = Array.from({length: size}, (_, i) => i);
            if (vec.r === 1) orderR.reverse();
            if (vec.c === 1) orderC.reverse();

            let moved = false;
            let mergedThisTurn = new Set();

            let map = Array.from({ length: size }, () => Array(size).fill(null));
            boardState.forEach(t => { map[t.r][t.c] = t; });

            orderR.forEach(r => {
                orderC.forEach(c => {
                    let tile = map[r][c];
                    if (!tile) return;

                    let currR = r;
                    let currC = c;
                    
                    while (true) {
                        let nextR = currR + vec.r;
                        let nextC = currC + vec.c;

                        if (nextR < 0 || nextR >= size || nextC < 0 || nextC >= size) break;

                        let target = map[nextR][nextC];
                        if (!target) {
                            map[currR][currC] = null;
                            map[nextR][nextC] = tile;
                            tile.r = nextR;
                            tile.c = nextC;
                            currR = nextR;
                            currC = nextC;
                            moved = true;
                        } else if (target.value === tile.value && !target.toRemove && !mergedThisTurn.has(target.id) && !mergedThisTurn.has(tile.id)) {
                            map[currR][currC] = null;
                            tile.r = nextR;
                            tile.c = nextC;
                            tile.toRemove = true; 
                            
                            target.value *= 2;
                            target.isMerged = true;
                            score += target.value;
                            
                            mergedThisTurn.add(target.id);
                            moved = true;
                            break;
                        } else {
                            break; 
                        }
                    }
                });
            });

            if (moved) {
                addRandomTile();
                renderTiles();
                if (checkGameOver()) {
                    gameOverElement.classList.add('active');
                }
            } else {
                history.pop(); 
                updatePowerups();
            }
        }

        function checkGameOver() {
            let activeTiles = boardState.filter(t => !t.toRemove);
            if (activeTiles.length < size * size) return false;
            
            let map = Array.from({ length: size }, () => Array(size).fill(0));
            activeTiles.forEach(t => { map[t.r][t.c] = t.value; });

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (c < size - 1 && map[r][c] === map[r][c+1]) return false;
                    if (r < size - 1 && map[r][c] === map[r+1][c]) return false;
                }
            }
            return true;
        }

        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                if (e.key === 'ArrowLeft') move('left');
                if (e.key === 'ArrowRight') move('right');
                if (e.key === 'ArrowUp') move('up');
                if (e.key === 'ArrowDown') move('down');
            }
        });

        init();
    </script>
</body>
</html>
